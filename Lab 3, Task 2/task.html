<!DOCTYPE html>
<html>
<head>
    <title>Online Job Application Form</title>
</head>
<body>

    <h2>Online Job Application Form</h2>

    <form method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            <br><br>

            <label for="nid">National ID Number:</label><br>
            <input type="text" id="nid" name="nid" placeholder="Enter your NID number" required>
            <br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            <br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label>Gender:</label><br>

            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>

        </fieldset>

        <br>

        <fieldset>
            <legend>Job Information</legend>

            <label for="position">Position Applied For:</label><br>
            <select id="position" name="position">
                <option selected>Software Developer</option>
                <option>Web Designer</option>
                <option>Network Engineer</option>
                <option>Database Administrator</option>
                <option>IT Support Officer</option>
            </select>

            <br><br>

            <label for="experience">Experience Level:</label><br>
            <select id="experience" name="experience">
                <option>Fresher</option>
                <option>1-2 Years</option>
                <option>3-5 Years</option>
                <option>More Than 5 Years</option>
            </select>

        </fieldset>

        <br>

        <fieldset>
            <legend>Technical Skills</legend>

            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label><br>

            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label><br>

            <input type="checkbox" id="sql" name="skills" value="SQL">
            <label for="sql">SQL</label>

        </fieldset>

        <br>

        <fieldset>
            <legend>Educational Information</legend>

            <label for="qualification">Highest Qualification:</label><br>
            <input type="text" id="qualification" name="qualification" placeholder="Enter your qualification" required>
            <br><br>

            <label for="university">University/College Name:</label><br>
            <input type="text" id="university" name="university" placeholder="Enter your university name" required>
            <br><br>

            <label for="year">Graduation Year:</label><br>
            <input type="number" id="year" name="year" placeholder="Enter graduation year" required>

        </fieldset>

        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="resume">Upload Resume/CV:</label><br>
            <input type="file" id="resume" name="resume">
            <br><br>

            <label for="cover">Cover Letter:</label><br>
            <textarea id="cover" name="cover" rows="5" cols="40" maxlength="300" placeholder="Write your cover letter"></textarea>
            <br><br>

            <label for="address">Current Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="40" placeholder="Enter your current address"></textarea>

        </fieldset>

        <br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
